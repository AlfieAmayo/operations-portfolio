<svg width="100%" viewBox="0 0 680 120" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Red Lantern Dining supply chain</title>
  <desc>Seven production nodes in sequence from sign-off to client warehouse.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="14" y="32" width="72" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="50" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">R&amp;D</text>
  <text x="50" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">sign-off</text>
  <line x1="86" y1="60" x2="100" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="100" y="32" width="72" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="136" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Factory A</text>
  <text x="136" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">production</text>
  <line x1="172" y1="60" x2="186" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="186" y="32" width="72" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="222" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">A to B</text>
  <text x="222" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">transport</text>
  <line x1="258" y1="60" x2="272" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="272" y="32" width="72" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="308" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#712B13">Factory B</text>
  <text x="308" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#993C1D">bottling</text>
  <line x1="344" y1="60" x2="358" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="358" y="32" width="72" height="56" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="394" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#2C2C2A">B to A</text>
  <text x="394" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">transport</text>
  <line x1="430" y1="60" x2="444" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="444" y="32" width="72" height="56" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="480" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#085041">Factory A</text>
  <text x="480" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0F6E56">labelling</text>
  <line x1="516" y1="60" x2="530" y2="60" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="32" width="136" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="598" y="54" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#3C3489">Client warehouse</text>
  <text x="598" y="72" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#534AB7">14 sites</text>
</svg>